<svg xmlns="http://www.w3.org/2000/svg" width="680" height="362" viewBox="0 0 680 362" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<title>Matriz de confusión aplicada al flag de comentarios en code review</title>

<rect x="0" y="0" width="680" height="362" fill="#ffffff"/>

<rect x="360" y="6" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="378" y="16" font-size="12" fill="#5F5E5A">Resultado correcto</text>
<rect x="500" y="6" width="12" height="12" rx="3" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="518" y="16" font-size="12" fill="#5F5E5A">Error</text>

<text x="345" y="36" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Predicción de Claude</text>
<text x="90" y="68" font-size="12" fill="#5F5E5A" text-anchor="middle">Realidad ↓</text>

<rect x="160" y="44" width="180" height="40" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="250" y="61" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Flaggea</text>
<text x="250" y="77" font-size="12" fill="#5F5E5A" text-anchor="middle">(positivo)</text>

<rect x="350" y="44" width="180" height="40" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="440" y="61" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">No flaggea</text>
<text x="440" y="77" font-size="12" fill="#5F5E5A" text-anchor="middle">(negativo)</text>

<rect x="30" y="92" width="120" height="108" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="90" y="132" font-size="12" fill="#2C2C2A" text-anchor="middle">El comentario</text>
<text x="90" y="146" font-size="12" fill="#2C2C2A" text-anchor="middle">contradice</text>
<text x="90" y="160" font-size="12" fill="#2C2C2A" text-anchor="middle">el código</text>

<rect x="30" y="206" width="120" height="108" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="90" y="253" font-size="12" fill="#2C2C2A" text-anchor="middle">El comentario</text>
<text x="90" y="267" font-size="12" fill="#2C2C2A" text-anchor="middle">es correcto</text>

<rect x="160" y="92" width="180" height="108" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="250" y="128" font-size="14" font-weight="500" fill="#04342C" text-anchor="middle">Verdadero positivo</text>
<text x="250" y="150" font-size="12" fill="#0F6E56" text-anchor="middle">(TP) · Flag correcto</text>
<text x="250" y="168" font-size="12" fill="#0F6E56" text-anchor="middle">El comentario sí miente</text>

<rect x="350" y="92" width="180" height="108" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="440" y="128" font-size="14" font-weight="500" fill="#501313" text-anchor="middle">Falso negativo</text>
<text x="440" y="150" font-size="12" fill="#A32D2D" text-anchor="middle">(FN) · Bug perdido</text>
<text x="440" y="168" font-size="12" fill="#A32D2D" text-anchor="middle">No avisó del error</text>

<rect x="160" y="206" width="180" height="108" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="250" y="242" font-size="14" font-weight="500" fill="#501313" text-anchor="middle">Falso positivo</text>
<text x="250" y="264" font-size="12" fill="#A32D2D" text-anchor="middle">(FP) · Ruido</text>
<text x="250" y="282" font-size="12" fill="#A32D2D" text-anchor="middle">Flaggea algo correcto</text>

<rect x="350" y="206" width="180" height="108" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="440" y="242" font-size="14" font-weight="500" fill="#04342C" text-anchor="middle">Verdadero negativo</text>
<text x="440" y="264" font-size="12" fill="#0F6E56" text-anchor="middle">(TN) · Acierto</text>
<text x="440" y="282" font-size="12" fill="#0F6E56" text-anchor="middle">Nada que reportar</text>

<line x1="545" y1="92" x2="545" y2="200" stroke="#888780" stroke-width="0.5"/>
<line x1="545" y1="92" x2="549" y2="92" stroke="#888780" stroke-width="0.5"/>
<line x1="545" y1="200" x2="549" y2="200" stroke="#888780" stroke-width="0.5"/>
<line x1="545" y1="146" x2="551" y2="146" stroke="#888780" stroke-width="0.5"/>
<text x="555" y="142" font-size="12" fill="#5F5E5A">Recall</text>
<text x="555" y="158" font-size="12" fill="#5F5E5A">TP/(TP+FN)</text>

<path d="M160 320 L160 324 L340 324 L340 320" fill="none" stroke="#888780" stroke-width="0.5"/>
<line x1="250" y1="324" x2="250" y2="328" stroke="#888780" stroke-width="0.5"/>
<text x="250" y="342" font-size="12" fill="#5F5E5A" text-anchor="middle">Precisión = TP / (TP + FP)</text>
</svg>
