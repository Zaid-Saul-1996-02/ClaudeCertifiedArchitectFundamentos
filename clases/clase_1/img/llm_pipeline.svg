<svg viewBox="0 0 1150 520" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">

  <!-- Background -->
  <rect width="1150" height="520" fill="#080c14" rx="16"/>

  <!-- ===== TÍTULO ===== -->
  <text x="575" y="38" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold" font-family="sans-serif">¿Cómo predice el siguiente token un LLM?</text>
  <text x="575" y="60" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="monospace">Entrada: "Siempre que llueve…"  →  Predicción: "escampa"  (= Esc + ampa)</text>

  <!-- ===== STEP LABELS ===== -->
  <text x="80"  y="90" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold" font-family="sans-serif">① TEXTO</text>
  <text x="248" y="90" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold" font-family="sans-serif">② TOKENS</text>
  <text x="445" y="90" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold" font-family="sans-serif">③ VECTORES</text>
  <text x="660" y="90" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold" font-family="sans-serif">④ TRANSFORMER</text>
  <text x="940" y="90" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold" font-family="sans-serif">⑤ LOGITS → PREDICCIÓN</text>

  <!-- ===== SECTION 1: TEXTO ===== -->
  <rect x="20" y="102" width="120" height="230" rx="10" fill="#0d1424" stroke="#1e2d45" stroke-width="1.5"/>
  <rect x="28" y="130" width="104" height="80" rx="7" fill="#1a2a4a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="156" text-anchor="middle" fill="#93c5fd" font-size="13" font-family="monospace">"Siempre</text>
  <text x="80" y="174" text-anchor="middle" fill="#93c5fd" font-size="13" font-family="monospace">que</text>
  <text x="80" y="192" text-anchor="middle" fill="#93c5fd" font-size="13" font-family="monospace">llueve…"</text>
  <text x="80" y="302" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">texto natural</text>

  <!-- Arrow 1→2 -->
  <line x1="140" y1="217" x2="160" y2="217" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrBlue)"/>

  <!-- ===== SECTION 2: TOKENS ===== -->
  <rect x="163" y="102" width="168" height="230" rx="10" fill="#0d1424" stroke="#1e2d45" stroke-width="1.5"/>

  <!-- token "Siempre" (púrpura) -->
  <rect x="174" y="120" width="146" height="26" rx="6" fill="#3a2f5c" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="247" y="138" text-anchor="middle" fill="#ddd6fe" font-size="13" font-weight="bold" font-family="monospace">Siempre</text>
  <!-- token " que" (verde) -->
  <rect x="174" y="150" width="146" height="26" rx="6" fill="#16351f" stroke="#4ade80" stroke-width="1.3"/>
  <text x="247" y="168" text-anchor="middle" fill="#bbf7d0" font-size="13" font-weight="bold" font-family="monospace">·que</text>
  <!-- token " ll" (ámbar) -->
  <rect x="174" y="180" width="146" height="26" rx="6" fill="#45330d" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="247" y="198" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="bold" font-family="monospace">·ll</text>
  <!-- token "ueve" (rojo) -->
  <rect x="174" y="210" width="146" height="26" rx="6" fill="#43201f" stroke="#f87171" stroke-width="1.3"/>
  <text x="247" y="228" text-anchor="middle" fill="#fecaca" font-size="13" font-weight="bold" font-family="monospace">ueve</text>

  <text x="247" y="256" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold" font-family="sans-serif">4 tokens — no 3 palabras</text>
  <text x="247" y="278" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-family="sans-serif">· = espacio inicial incluido en el token</text>
  <text x="247" y="296" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-family="sans-serif">cada token → 1 ID entero del vocabulario</text>
  <text x="247" y="314" text-anchor="middle" fill="#64748b" font-size="8" font-family="sans-serif">"llueve" se parte en 2 sub-palabras (ll + ueve)</text>

  <!-- Arrows 2→3 -->
  <line x1="320" y1="133" x2="356" y2="146" stroke="#475569" stroke-width="1.3" marker-end="url(#arrGray)"/>
  <line x1="320" y1="163" x2="356" y2="176" stroke="#475569" stroke-width="1.3" marker-end="url(#arrGray)"/>
  <line x1="320" y1="193" x2="356" y2="206" stroke="#475569" stroke-width="1.3" marker-end="url(#arrGray)"/>
  <line x1="320" y1="223" x2="356" y2="236" stroke="#475569" stroke-width="1.3" marker-end="url(#arrGray)"/>

  <!-- ===== SECTION 3: VECTORES ===== -->
  <rect x="358" y="102" width="182" height="230" rx="10" fill="#0d1424" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="449" y="118" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="bold" font-family="sans-serif">embedding por token</text>

  <!-- Vector Siempre -->
  <text x="366" y="140" fill="#93c5fd" font-size="9.5" font-family="monospace">Siempre →</text>
  <rect x="446" y="129" width="18" height="13" rx="2" fill="#3b82f6"/>
  <rect x="466" y="133" width="12" height="9"  rx="2" fill="#818cf8"/>
  <rect x="480" y="127" width="20" height="15" rx="2" fill="#6366f1"/>
  <rect x="502" y="130" width="15" height="12" rx="2" fill="#3b82f6"/>
  <rect x="519" y="128" width="10" height="14" rx="2" fill="#818cf8"/>
  <text x="366" y="152" fill="#94a3b8" font-size="8" font-family="monospace">[0.52, -0.31, 0.87 …]</text>

  <!-- Vector ·que -->
  <text x="366" y="168" fill="#93c5fd" font-size="9.5" font-family="monospace">·que →</text>
  <rect x="446" y="157" width="12" height="13" rx="2" fill="#818cf8"/>
  <rect x="460" y="154" width="22" height="16" rx="2" fill="#3b82f6"/>
  <rect x="484" y="158" width="15" height="12" rx="2" fill="#6366f1"/>
  <rect x="501" y="155" width="19" height="15" rx="2" fill="#3b82f6"/>
  <rect x="522" y="157" width="9"  height="13" rx="2" fill="#818cf8"/>
  <text x="366" y="180" fill="#94a3b8" font-size="8" font-family="monospace">[0.11, 0.76, -0.44 …]</text>

  <!-- Vector ·ll -->
  <text x="366" y="196" fill="#93c5fd" font-size="9.5" font-family="monospace">·ll →</text>
  <rect x="446" y="185" width="22" height="13" rx="2" fill="#6366f1"/>
  <rect x="470" y="189" width="11" height="9"  rx="2" fill="#818cf8"/>
  <rect x="483" y="183" width="18" height="15" rx="2" fill="#3b82f6"/>
  <rect x="503" y="186" width="16" height="12" rx="2" fill="#6366f1"/>
  <rect x="521" y="184" width="10" height="14" rx="2" fill="#3b82f6"/>
  <text x="366" y="208" fill="#94a3b8" font-size="8" font-family="monospace">[0.69, -0.08, 0.55 …]</text>

  <!-- Vector ueve -->
  <text x="366" y="224" fill="#93c5fd" font-size="9.5" font-family="monospace">ueve →</text>
  <rect x="446" y="213" width="15" height="13" rx="2" fill="#3b82f6"/>
  <rect x="463" y="217" width="20" height="9"  rx="2" fill="#6366f1"/>
  <rect x="485" y="211" width="12" height="15" rx="2" fill="#818cf8"/>
  <rect x="499" y="214" width="18" height="12" rx="2" fill="#3b82f6"/>
  <rect x="519" y="212" width="12" height="14" rx="2" fill="#6366f1"/>
  <text x="366" y="236" fill="#94a3b8" font-size="8" font-family="monospace">[-0.27, 0.41, 0.13 …]</text>

  <text x="449" y="266" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">matriz 4 × D</text>
  <text x="449" y="288" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">vectores numéricos por token</text>
  <text x="449" y="308" text-anchor="middle" fill="#64748b" font-size="8" font-family="sans-serif">valores ilustrativos</text>

  <!-- Arrow 3→4 -->
  <line x1="540" y1="217" x2="562" y2="217" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrBlue)"/>

  <!-- ===== SECTION 4: TRANSFORMER ===== -->
  <rect x="565" y="102" width="178" height="230" rx="10" fill="#0d1424" stroke="#6366f1" stroke-width="2"/>
  <text x="654" y="124" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="bold" font-family="sans-serif">Transformer</text>

  <g stroke="#2e3a6e" stroke-width="1">
    <line x1="595" y1="150" x2="628" y2="163"/><line x1="595" y1="150" x2="628" y2="190"/>
    <line x1="595" y1="177" x2="628" y2="163"/><line x1="595" y1="177" x2="628" y2="190"/><line x1="595" y1="177" x2="628" y2="217"/>
    <line x1="595" y1="204" x2="628" y2="190"/><line x1="595" y1="204" x2="628" y2="217"/>
    <line x1="595" y1="231" x2="628" y2="217"/><line x1="595" y1="231" x2="628" y2="244"/>
    <line x1="628" y1="163" x2="661" y2="150"/><line x1="628" y1="163" x2="661" y2="177"/><line x1="628" y1="163" x2="661" y2="204"/>
    <line x1="628" y1="190" x2="661" y2="177"/><line x1="628" y1="190" x2="661" y2="204"/>
    <line x1="628" y1="217" x2="661" y2="204"/><line x1="628" y1="217" x2="661" y2="231"/>
    <line x1="628" y1="244" x2="661" y2="231"/><line x1="628" y1="244" x2="661" y2="258"/>
    <line x1="661" y1="150" x2="694" y2="163"/><line x1="661" y1="177" x2="694" y2="163"/><line x1="661" y1="177" x2="694" y2="190"/>
    <line x1="661" y1="204" x2="694" y2="190"/><line x1="661" y1="204" x2="694" y2="217"/>
    <line x1="661" y1="231" x2="694" y2="217"/><line x1="661" y1="231" x2="694" y2="244"/>
    <line x1="661" y1="258" x2="694" y2="244"/>
  </g>
  <circle cx="595" cy="150" r="7" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.2"/>
  <circle cx="595" cy="177" r="7" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.2"/>
  <circle cx="595" cy="204" r="7" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.2"/>
  <circle cx="595" cy="231" r="7" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.2"/>
  <circle cx="628" cy="163" r="7" fill="#4338ca" stroke="#818cf8" stroke-width="1.2"/>
  <circle cx="628" cy="190" r="7" fill="#4338ca" stroke="#818cf8" stroke-width="1.2"/>
  <circle cx="628" cy="217" r="7" fill="#4338ca" stroke="#818cf8" stroke-width="1.2"/>
  <circle cx="628" cy="244" r="7" fill="#4338ca" stroke="#818cf8" stroke-width="1.2"/>
  <circle cx="661" cy="150" r="7" fill="#5b21b6" stroke="#a5b4fc" stroke-width="1.2"/>
  <circle cx="661" cy="177" r="7" fill="#5b21b6" stroke="#a5b4fc" stroke-width="1.2"/>
  <circle cx="661" cy="204" r="7" fill="#5b21b6" stroke="#a5b4fc" stroke-width="1.2"/>
  <circle cx="661" cy="231" r="7" fill="#5b21b6" stroke="#a5b4fc" stroke-width="1.2"/>
  <circle cx="661" cy="258" r="7" fill="#5b21b6" stroke="#a5b4fc" stroke-width="1.2"/>
  <circle cx="694" cy="163" r="7" fill="#7c3aed" stroke="#c4b5fd" stroke-width="1.2"/>
  <circle cx="694" cy="190" r="7" fill="#7c3aed" stroke="#c4b5fd" stroke-width="1.2"/>
  <circle cx="694" cy="217" r="7" fill="#7c3aed" stroke="#c4b5fd" stroke-width="1.2"/>
  <circle cx="694" cy="244" r="7" fill="#7c3aed" stroke="#c4b5fd" stroke-width="1.2"/>

  <text x="654" y="282" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">capas de atención</text>
  <text x="654" y="298" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">+ feed-forward</text>

  <!-- Arrow 4→5 -->
  <line x1="743" y1="217" x2="765" y2="217" stroke="#22c55e" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="754" y="209" text-anchor="middle" fill="#86efac" font-size="8.5" font-family="monospace">logits</text>

  <!-- ===== SECTION 5: LOGITS ===== -->
  <rect x="768" y="102" width="360" height="330" rx="10" fill="#0d1424" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="948" y="122" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="bold" font-family="sans-serif">Vocabulario (~50.000 tokens) — Logits del SIGUIENTE token</text>

  <!-- Esc - WINNER (primer token de "escampa") -->
  <rect x="778" y="132" width="76" height="24" rx="5" fill="#14532d" stroke="#22c55e" stroke-width="1.8"/>
  <text x="816" y="149" text-anchor="middle" fill="#86efac" font-size="12" font-weight="bold" font-family="monospace">Esc</text>
  <rect x="862" y="137" width="206" height="14" rx="3" fill="#16a34a"/>
  <text x="1078" y="149" fill="#4ade80" font-size="11" font-weight="bold" font-family="monospace">8.74 ★</text>

  <!-- sigue -->
  <rect x="778" y="164" width="76" height="24" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="816" y="181" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="monospace">sigue</text>
  <rect x="862" y="169" width="120" height="14" rx="3" fill="#1e3a5f"/>
  <text x="988" y="181" fill="#94a3b8" font-size="10" font-family="monospace">5.21</text>

  <!-- para -->
  <rect x="778" y="196" width="76" height="24" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="816" y="213" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="monospace">para</text>
  <rect x="862" y="201" width="90" height="14" rx="3" fill="#1e3a5f"/>
  <text x="958" y="213" fill="#94a3b8" font-size="10" font-family="monospace">3.87</text>

  <!-- gran -->
  <rect x="778" y="228" width="76" height="24" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="816" y="245" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="monospace">gran</text>
  <rect x="862" y="233" width="64" height="14" rx="3" fill="#1e3a5f"/>
  <text x="932" y="245" fill="#94a3b8" font-size="10" font-family="monospace">2.80</text>

  <!-- cae -->
  <rect x="778" y="260" width="76" height="24" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="816" y="277" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="monospace">cae</text>
  <rect x="862" y="265" width="44" height="14" rx="3" fill="#1e3a5f"/>
  <text x="912" y="277" fill="#94a3b8" font-size="10" font-family="monospace">1.95</text>

  <!-- tru -->
  <rect x="778" y="292" width="76" height="24" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="816" y="309" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="monospace">tru</text>
  <rect x="862" y="297" width="30" height="14" rx="3" fill="#1e3a5f"/>
  <text x="898" y="309" fill="#94a3b8" font-size="10" font-family="monospace">1.12</text>

  <text x="948" y="334" text-anchor="middle" fill="#64748b" font-size="8.5" font-family="sans-serif">candidatos = tokens del vocabulario · puntuaciones ilustrativas</text>

  <!-- Arrow resultado -->
  <line x1="948" y1="340" x2="948" y2="360" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrGreen)"/>

  <!-- Resultado box: generación token a token -->
  <rect x="800" y="364" width="296" height="60" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="948" y="383" text-anchor="middle" fill="#86efac" font-size="9.5" font-family="sans-serif">El modelo predice 1 token por paso</text>
  <text x="948" y="404" text-anchor="middle" fill="#ffffff" font-size="13" font-family="monospace">paso 1: <tspan fill="#86efac" font-weight="bold">Esc</tspan>   →   paso 2: <tspan fill="#86efac" font-weight="bold">ampa</tspan></text>
  <text x="948" y="419" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="bold" font-family="monospace">«escampa» = 2 tokens</text>

  <!-- ===== FOOTER ===== -->
  <rect x="20" y="452" width="1110" height="52" rx="8" fill="#0d1424" stroke="#1e2d45" stroke-width="1"/>
  <text x="575" y="470" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-family="sans-serif">Texto → Tokenización (sub-palabras, no palabras) → Embeddings → Transformer → Logits por token → Mayor logit = siguiente token</text>
  <text x="575" y="488" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">El texto se genera token a token: «escampa» se produce en 2 pasos (Esc, ampa) · Arquitectura Transformer (Vaswani et al., 2017)</text>

  <!-- ===== MARKERS ===== -->
  <defs>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>

</svg>
